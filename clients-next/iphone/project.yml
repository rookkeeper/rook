name: Rook
options:
  bundleIdPrefix: com.rookery
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
packages:
  RookKit:
    path: ../RookKit
targets:
  Rook:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: RookKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rookery.Rook
        PRODUCT_NAME: Rook
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Sources/Info.plist
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
schemes:
  Rook:
    build:
      targets:
        Rook: all
    run:
      config: Debug
