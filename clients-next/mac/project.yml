name: Rook
options:
  bundleIdPrefix: com.rookery
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: "-"
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
packages:
  RookKit:
    path: ../RookKit
targets:
  Rook:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: RookKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rookery.Rook
        PRODUCT_NAME: Rook
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Sources/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
schemes:
  Rook:
    build:
      targets:
        Rook: all
    run:
      config: Debug
