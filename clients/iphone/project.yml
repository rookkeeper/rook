name: Rook
options:
  bundleIdPrefix: com.rookery
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
packages:
  RookKit:
    path: ../RookKit
targets:
  Rook:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    dependencies:
      - package: RookKit
      - target: RookWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rookery.Rook
        PRODUCT_NAME: Rook
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Rook.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  RookWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: RookWidgets
    dependencies:
      - package: RookKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rookery.Rook.RookWidgets
        PRODUCT_NAME: RookWidgets
        INFOPLIST_FILE: RookWidgets/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        SWIFT_VERSION: "5.9"
schemes:
  Rook:
    build:
      targets:
        Rook: all
    run:
      config: Debug
