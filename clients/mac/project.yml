name: Rook
options:
  bundleIdPrefix: com.rookery
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: "-"
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
packages:
  RookKit:
    path: ../RookKit
targets:
  Rook:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    dependencies:
      - package: RookKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rookery.Rook
        PRODUCT_NAME: Rook
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Rook.entitlements
        ENABLE_HARDENED_RUNTIME: "NO"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  RookTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Rook
      - package: RookKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rookery.RookTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Rook.app/Contents/MacOS/Rook"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  Rook:
    build:
      targets:
        Rook: all
        RookTests: [test]
    test:
      targets:
        - RookTests
    run:
      config: Debug
